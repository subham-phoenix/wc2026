<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup — Knockout Brackets 2002–2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#05070b;--panel:#0e151f;--panel-2:#121c28;--line:#293a51;--gold:#e0b84a;--gold-dim:#7a652c;--gold-soft:#f0d070;--green:#22a973;--green-dim:#155e42;--text:#eee9da;--text-dim:#92a0b3;--text-dimmer:#576678;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#05070b;color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
  body{background-image:radial-gradient(circle at 50% 38%,rgba(224,184,74,.10) 0%,rgba(224,184,74,.03) 28%,transparent 55%),radial-gradient(circle at 50% 50%,#0a1018 0%,#05070b 70%);}
  ::selection{background:var(--gold);color:#05070b;}

  /* ── TABS ── */
  .page-wrap{display:flex;min-height:100vh;}
  .tab-rail{
    width:72px;flex-shrink:0;
    background:linear-gradient(180deg,#080d14,#05070b);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;
    padding:14px 0;gap:6px;position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .tab-rail-label{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.1em;color:var(--text-dimmer);text-transform:uppercase;margin-bottom:4px;writing-mode:vertical-rl;transform:rotate(180deg);}
  .tab-btn{
    width:52px;height:52px;border-radius:10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    background:transparent;border:1px solid transparent;
    cursor:pointer;transition:all .2s;
    font-family:'Oswald',sans-serif;
  }
  .tab-btn:hover{background:rgba(224,184,74,.08);border-color:var(--line);}
  .tab-btn.active{background:rgba(224,184,74,.12);border-color:var(--gold-dim);}
  .tab-btn .tab-year{font-size:14px;font-weight:700;color:var(--text-dim);line-height:1;}
  .tab-btn.active .tab-year{color:var(--gold);}
  .tab-btn .tab-flag{font-size:14px;line-height:1;}
  .tab-btn .tab-host{font-family:'Space Mono',monospace;font-size:7px;color:var(--text-dimmer);text-align:center;line-height:1.2;}
  .tab-btn.active .tab-host{color:var(--gold-dim);}
  .tab-divider{width:36px;height:1px;background:var(--line);margin:4px 0;}

  /* ── MAIN CONTENT ── */
  .main-content{flex:1;min-width:0;}
  .tournament-view{display:none;}
  .tournament-view.active{display:block;}

  header{padding:22px 20px 10px;text-align:center;}
  .eyebrow{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:7px;}
  h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(22px,4vw,44px);letter-spacing:.02em;text-transform:uppercase;background:linear-gradient(180deg,#f7e8b5,var(--gold) 55%,var(--gold-dim));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--text-dim);font-size:13px;margin-top:4px;}
  .tournament-badge{display:inline-flex;align-items:center;gap:8px;margin:10px auto 0;padding:6px 16px;border-radius:999px;border:1px solid var(--gold-dim);background:linear-gradient(135deg,rgba(224,184,74,.08),rgba(224,184,74,.02));font-family:'Space Mono',monospace;font-size:11px;color:var(--gold-dim);letter-spacing:.06em;}
  .tournament-badge .badge-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);}
  .meta-row{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;}
  .updated-pill{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border:1px solid var(--line);border-radius:999px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dimmer);background:rgba(255,255,255,.02);}
  .updated-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
  .updated-pill .dot.grey{background:var(--text-dimmer);box-shadow:none;animation:none;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .refresh-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;border:1px solid var(--gold-dim);background:transparent;color:var(--gold);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:background .2s,color .2s;}
  .refresh-btn:hover{background:var(--gold);color:#05070b;}
  .refresh-btn.disabled{border-color:var(--line);color:var(--text-dimmer);cursor:not-allowed;opacity:.5;}
  .refresh-btn.disabled:hover{background:transparent;color:var(--text-dimmer);}

  .layout{display:grid;grid-template-columns:220px minmax(0,1fr) 220px;gap:14px;max-width:1300px;margin:0 auto;padding:6px 16px 50px;align-items:start;}
  @media(max-width:1100px){.layout{grid-template-columns:1fr;}}

  .rail{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:14px;padding:14px 12px;position:sticky;top:14px;}
  @media(max-width:1100px){.rail{position:static;}}
  .rail h2{font-family:'Oswald',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--gold);border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
  .rail .tag{font-family:'Space Mono',monospace;font-size:8.5px;color:var(--text-dimmer);text-transform:none;}
  .leader-row{display:flex;align-items:center;gap:8px;padding:7px 4px;border-radius:8px;transition:background .15s;}
  .leader-row:hover{background:rgba(224,184,74,.07);}
  .leader-rank{font-family:'Space Mono',monospace;font-weight:700;font-size:11px;color:var(--text-dimmer);width:18px;flex-shrink:0;}
  .leader-flag{font-size:16px;flex-shrink:0;min-width:20px;text-align:center;}
  .leader-info{flex:1;min-width:0;}
  .leader-name{font-size:11.5px;font-weight:600;line-height:1.2;}
  .leader-country{font-size:10px;color:var(--text-dimmer);}
  .bar-bg{height:2px;background:rgba(255,255,255,.06);border-radius:1px;margin-top:3px;}
  .bar-fill{height:2px;border-radius:1px;background:linear-gradient(90deg,var(--gold-dim),var(--gold));}
  .leader-stat{font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;color:var(--text);flex-shrink:0;text-align:center;}
  .leader-stat span{font-size:8px;color:var(--text-dimmer);font-family:'Inter';display:block;}

  .wheel-wrap{display:flex;flex-direction:column;align-items:center;}
  .wheel-stage{position:relative;width:100%;max-width:880px;}
  svg.bracket{width:100%;height:auto;display:block;overflow:visible;}

  .tie-line{fill:none;stroke:var(--line);stroke-width:1.4;}
  .spoke-line{fill:none;stroke:var(--line);stroke-width:1.4;}
  .tie-line.won{stroke:rgba(224,184,74,.5);stroke-width:2;}
  .spoke-line.won{stroke:rgba(224,184,74,.5);stroke-width:2;}
  .joint-dot{fill:var(--text-dimmer);}
  .joint-dot.won{fill:var(--gold);}

  .leaf-node{cursor:pointer;}
  .leaf-badge{fill:var(--panel-2);stroke:var(--line);stroke-width:1.3;transition:stroke .2s,fill .2s;}
  .leaf-node:hover .leaf-badge{stroke:var(--gold);fill:#16202d;}
  .leaf-badge.completed{stroke:var(--green-dim);fill:#0b1a14;}
  .leaf-node:hover .leaf-badge.completed{stroke:var(--green);}
  .leaf-name{font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:500;fill:var(--text);pointer-events:none;}
  .leaf-name.win{fill:var(--gold-soft);font-weight:600;}
  .score-tag{font-family:'Space Mono',monospace;font-size:8px;fill:var(--gold);pointer-events:none;}

  .r16-node{cursor:pointer;}
  .r16-badge{fill:var(--panel-2);stroke:var(--line);stroke-width:1.3;transition:stroke .2s,fill .2s;}
  .r16-node:hover .r16-badge{stroke:var(--gold);fill:#16202d;}
  .r16-badge.completed{stroke:var(--green-dim);fill:#0b1a14;}
  .r16-node:hover .r16-badge.completed{stroke:var(--green);}
  .r16-divider{stroke:#293a51;stroke-width:1;}
  .r16-name{font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:500;fill:var(--text);pointer-events:none;}
  .r16-name.win{fill:var(--gold-soft);font-weight:600;}
  .r16-score-tag{font-family:'Space Mono',monospace;font-size:8px;fill:var(--gold);pointer-events:none;}

  .qf-node{cursor:pointer;}
  .qf-badge{fill:#100b1a;stroke:rgba(138,117,48,.5);stroke-width:1.3;transition:stroke .2s,fill .2s;}
  .qf-node:hover .qf-badge{stroke:var(--gold);fill:#1a1426;}
  .qf-badge.completed{stroke:var(--green-dim);fill:#0b1a14;}
  .qf-node:hover .qf-badge.completed{stroke:var(--green);}
  .qf-divider{stroke:#2a1f40;stroke-width:1;}
  .qf-name{font-family:'Oswald',sans-serif;font-size:10px;font-weight:500;fill:var(--text-dim);pointer-events:none;}
  .qf-name.win{fill:var(--gold-soft);font-weight:600;}
  .qf-score-tag{font-family:'Space Mono',monospace;font-size:7.5px;fill:var(--gold);pointer-events:none;}

  .center-ring{fill:url(#trophyGlow);stroke:var(--gold-dim);stroke-width:1.4;}
  .center-label{font-family:'Oswald',sans-serif;font-size:12px;fill:var(--gold);text-anchor:middle;letter-spacing:.1em;}
  .center-sub{font-family:'Space Mono',monospace;font-size:8px;fill:var(--text-dimmer);text-anchor:middle;}

  .legend{display:flex;gap:12px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);}
  .legend-line{width:16px;height:0;border-top:2px solid;}
  .legend-sq{width:10px;height:10px;border-radius:3px;}

  .panel-overlay{position:fixed;inset:0;background:rgba(2,4,8,.82);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .panel-overlay.open{display:flex;}
  .match-panel{width:100%;max-width:480px;background:linear-gradient(180deg,#121c28,#0a0f17);border:1px solid var(--line);border-radius:18px;padding:24px 22px;max-height:90vh;overflow-y:auto;animation:slideUp .22s ease;box-shadow:0 30px 80px rgba(0,0,0,.7);}
  @keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .panel-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
  .panel-round{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.1em;}
  .panel-adv{font-size:11px;color:var(--green);font-family:'Space Mono',monospace;margin-top:3px;}
  .close-btn{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;line-height:1;padding:2px 8px;border-radius:6px;}
  .close-btn:hover{background:rgba(255,255,255,.08);color:var(--text);}
  .teams-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:12px 0 6px;}
  .team-block{text-align:center;flex:1;}
  .team-flag-big{font-size:30px;display:block;margin-bottom:5px;}
  .team-name-big{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;line-height:1.2;}
  .team-name-big.winner-text{color:var(--gold);}
  .score-central{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;color:var(--gold);min-width:70px;text-align:center;}
  .pens-note{text-align:center;font-size:10px;color:var(--text-dimmer);font-family:'Space Mono',monospace;margin-top:1px;}
  .vs-label{text-align:center;font-family:'Space Mono',monospace;color:var(--text-dimmer);font-size:20px;min-width:70px;}
  .status-badge{display:block;text-align:center;margin:5px auto 12px;width:fit-content;font-family:'Space Mono',monospace;font-size:10px;padding:3px 11px;border-radius:999px;text-transform:uppercase;letter-spacing:.06em;}
  .status-badge.ft{background:rgba(34,169,115,.15);color:var(--green);border:1px solid rgba(34,169,115,.4);}
  .status-badge.scheduled{background:rgba(224,184,74,.1);color:var(--gold);border:1px solid rgba(224,184,74,.35);}
  .panel-section{margin-top:14px;padding-top:12px;border-top:1px solid var(--line);}
  .panel-section h3{font-family:'Oswald',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:7px;display:flex;align-items:center;gap:5px;}
  .ist-row{display:flex;align-items:center;gap:10px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 13px;}
  .ist-icon{font-size:20px;flex-shrink:0;}
  .ist-info{flex:1;}
  .ist-date{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);}
  .ist-time{font-family:'Space Mono',monospace;font-size:15px;color:var(--text);font-weight:700;margin:1px 0;}
  .ist-venue{font-size:11px;color:var(--text-dimmer);}
  .scorers-list{list-style:none;font-size:12.5px;line-height:1.65;color:var(--text);}
  .scorers-list li{padding:2px 0 2px 18px;position:relative;}
  .scorers-list li::before{content:"⚽";position:absolute;left:0;font-size:10px;top:4px;}
  .no-data{font-size:12px;color:var(--text-dimmer);font-style:italic;}
  .highlights-list{list-style:none;}
  .highlights-list li{display:flex;gap:9px;align-items:flex-start;padding:5px 0;border-bottom:1px solid rgba(41,58,81,.5);}
  .highlights-list li:last-child{border-bottom:none;}
  .hl-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
  .hl-text{font-size:12px;line-height:1.5;color:var(--text-dim);}


  /* ── AWARDS STRIP ── */
  .awards-strip{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:12px 16px 4px;}
  .award-card{display:flex;align-items:center;gap:9px;background:linear-gradient(135deg,rgba(224,184,74,.09),rgba(224,184,74,.02));border:1px solid rgba(224,184,74,.22);border-radius:10px;padding:8px 13px;min-width:160px;}
  .award-icon{font-size:20px;flex-shrink:0;}
  .award-info{flex:1;min-width:0;}
  .award-label{font-family:'Space Mono',monospace;font-size:8px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:2px;}
  .award-name{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--text);line-height:1.2;}
  .award-country{font-size:10px;color:var(--text-dimmer);}

  .svgWrap{width:100%;}
  .svgWrap svg{width:100%;height:auto;display:block;overflow:visible;}

  /* SF boxes — golden tint, deeper than QF */
  .sf-badge{fill:#150d05;stroke:rgba(180,140,30,.55);stroke-width:1.3;transition:stroke .2s,fill .2s;}
  .sf-node:hover .sf-badge{stroke:var(--gold);fill:#1e1508;}
  .sf-badge.completed{stroke:var(--green-dim);fill:#0b1a14;}
  .sf-node:hover .sf-badge.completed{stroke:var(--green);}
  .sf-name{font-family:'Oswald',sans-serif;font-size:10px;font-weight:500;fill:var(--text-dim);pointer-events:none;}
  .sf-name.win{fill:var(--gold-soft);font-weight:600;}
  .sf-score-tag{font-family:'Space Mono',monospace;font-size:7.5px;fill:var(--gold);pointer-events:none;}
  footer{text-align:center;padding:20px 20px 42px;color:var(--text-dimmer);font-size:11px;font-family:'Space Mono',monospace;line-height:1.7;}
</style>
</head>
<body>
<div class="page-wrap">

<!-- ── TAB RAIL ── -->
<nav class="tab-rail">
  <div class="tab-rail-label">World Cup</div>
  <button class="tab-btn active" data-year="2026" onclick="switchTab(2026)">
    <span class="tab-flag">🇺🇸🇨🇦🇲🇽</span>
    <span class="tab-year">2026</span>
    <span class="tab-host">USA·CAN·MEX</span>
  </button>
  <div class="tab-divider"></div>
  <button class="tab-btn" data-year="2022" onclick="switchTab(2022)">
    <span class="tab-flag">🇶🇦</span>
    <span class="tab-year">2022</span>
    <span class="tab-host">Qatar</span>
  </button>
  <button class="tab-btn" data-year="2018" onclick="switchTab(2018)">
    <span class="tab-flag">🇷🇺</span>
    <span class="tab-year">2018</span>
    <span class="tab-host">Russia</span>
  </button>
  <button class="tab-btn" data-year="2014" onclick="switchTab(2014)">
    <span class="tab-flag">🇧🇷</span>
    <span class="tab-year">2014</span>
    <span class="tab-host">Brazil</span>
  </button>
  <button class="tab-btn" data-year="2010" onclick="switchTab(2010)">
    <span class="tab-flag">🇿🇦</span>
    <span class="tab-year">2010</span>
    <span class="tab-host">S.Africa</span>
  </button>
  <button class="tab-btn" data-year="2006" onclick="switchTab(2006)">
    <span class="tab-flag">🇩🇪</span>
    <span class="tab-year">2006</span>
    <span class="tab-host">Germany</span>
  </button>
  <button class="tab-btn" data-year="2002" onclick="switchTab(2002)">
    <span class="tab-flag">🇰🇷🇯🇵</span>
    <span class="tab-year">2002</span>
    <span class="tab-host">KOR·JPN</span>
  </button>
</nav>

<!-- ── MAIN CONTENT ── -->
<div class="main-content" id="mainContent">
  <!-- Rendered dynamically by JS -->
</div>
</div>

<!-- ── MATCH PANEL ── -->
<div class="panel-overlay" id="panelOverlay">
  <div class="match-panel" id="matchPanel"></div>
</div>


<script>
'use strict';
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const NS='http://www.w3.org/2000/svg';
const EF="'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif";
const CX=460,CY=460,Rleaf=335,Rr16=258,Rqf=178,Rsf=108,Rfinal=90;

function polar(r,deg){
  const rad=(deg-90)*Math.PI/180;
  return{x:CX+r*Math.cos(rad), y:CY+r*Math.sin(rad)};
}
function boxPt(R,deg,push){
  const p=polar(R,deg), rad=(deg-90)*Math.PI/180;
  return{bx:p.x+Math.cos(rad)*push, by:p.y+Math.sin(rad)*push};
}

const leafA=[0,22.5,45,67.5,90,112.5,135,157.5,180,202.5,225,247.5,270,292.5,315,337.5];
const r16A=[11.25,56.25,101.25,146.25,191.25,236.25,281.25,326.25];
const qfA=[33.75,123.75,213.75,303.75];
const sfA=[78.75,258.75];
const LEAVES=leafA.map(a=>{const p=polar(Rleaf,a);return{a,x:parseFloat(p.x.toFixed(1)),y:parseFloat(p.y.toFixed(1))};});

// SVG DOM helpers
function mk(tag,attrs={}){
  const e=document.createElementNS(NS,tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  return e;
}
function mkT(g,x,y,text,attrs={}){
  const t=mk('text',{x:x.toFixed(1),y:y.toFixed(1),'dominant-baseline':'central',...attrs});
  t.textContent=text; g.appendChild(t); return t;
}
function mkBox(g,bx,by,BW,BH,cls){
  return mk('rect',{x:(bx-BW/2).toFixed(1),y:(by-BH/2).toFixed(1),width:BW,height:BH,rx:7,class:cls});
}
function mkDiv(g,bx,by,BW){
  return mk('line',{x1:(bx-BW/2+5).toFixed(1),x2:(bx+BW/2-5).toFixed(1),y1:by.toFixed(1),y2:by.toFixed(1),stroke:'#293a51','stroke-width':'1'});
}
function teamRow(g,flag,name,isWin,bx,by,yOff,BW,nameCls){
  const ft=mk('text',{x:(bx-BW/2+13).toFixed(1),y:(by+yOff).toFixed(1),'text-anchor':'middle','dominant-baseline':'central','font-size':'14','font-family':EF});
  ft.textContent=flag; g.appendChild(ft);
  const nt=mk('text',{x:(bx-BW/2+26).toFixed(1),y:(by+yOff).toFixed(1),'dominant-baseline':'central',class:nameCls+(isWin?' win':'')});
  nt.textContent=name.length>11?name.slice(0,10)+'…':name; g.appendChild(nt);
}

// ── TOURNAMENT DATA ──────────────────────────────────────────────────────────
// Data shape for ALL tournaments (historical and 2026):
// {year, host, winner, completed, finalDate, finalVenue, updated,
//  awards (null for 2026),
//  leaf: [...] -- R32 for 2026 (16 items), R16 for historical (8 items)
//  r16:  [...] -- R16 for 2026 (8 items),  QF for historical (4 items) 
//  qf:   [...] -- QF for 2026 (4 items),   SF for historical (2 items)
//  final: {...} or null
//  scorers: [...], assists: [...] }

const DATA={

// ── WC 2026 ─────────────────────────────────────────────────────────────────
2026:{year:2026,host:"USA · Canada · Mexico",winner:"TBD",completed:false,
 finalDate:"19 July 2026",finalVenue:"MetLife Stadium, New Jersey",
 updated:"11AM IST, 14 July 2026",awards:null,

function buildRail(list,id,key,lbl){
  const cont=document.getElementById(id); if(!cont)return;
  const max=list[0][key];
  list.forEach((p,i)=>{
    const pct=Math.round((p[key]/max)*100);
    const medals=['','🥇','🥈','🥉'];
    const row=document.createElement('div'); row.className='leader-row';
    row.innerHTML=`<div class="leader-rank">${i<3?medals[i+1]:p.rank}</div>`+
      `<div class="leader-flag">${p.flag}</div>`+
      `<div class="leader-info">`+
        `<div class="leader-name">${p.name}${p.note?`<span style="font-size:9px;color:var(--text-dimmer);margin-left:4px;">${p.note}</span>`:''}</div>`+
        `<div class="leader-country">${p.country}</div>`+
        `<div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>`+
      `</div>`+
      `<div class="leader-stat">${p[key]}<span>${lbl}</span></div>`;
    cont.appendChild(row);
  });
}

// ── SVG WHEEL BUILDER ────────────────────────────────────────────────────────
function buildSVG(year,d,is26){
  const wrap=document.getElementById(`svgWrap_${year}`); if(!wrap)return;

  // Create SVG root
  const svg=mk('svg',{viewBox:'0 0 920 920',class:'bracket',id:`svg_${year}`});
  svg.style.cssText='width:100%;height:auto;display:block;overflow:visible;';

  // Gradient
  const defs=mk('defs');
  const grad=mk('radialGradient',{id:`tg_${year}`,cx:'50%',cy:'42%',r:'65%'});
  grad.appendChild(mk('stop',{offset:'0%','stop-color':'#3d3013'}));
  grad.appendChild(mk('stop',{offset:'55%','stop-color':'#1c1608'}));
  grad.appendChild(mk('stop',{offset:'100%','stop-color':'#0c0a06'}));
  defs.appendChild(grad); svg.appendChild(defs);

  // Layer groups (all DOM-created → correct SVG namespace)
  const cL=mk('g'); svg.appendChild(cL);
  const lL=mk('g'); svg.appendChild(lL);
  const r16L=mk('g'); svg.appendChild(r16L);
  const qfL=mk('g'); svg.appendChild(qfL);

  // Center
  const ring=mk('circle',{cx:'460',cy:'460',r:'86',class:'center-ring'});
  ring.style.fill=`url(#tg_${year})`; svg.appendChild(ring);
  const ti=mk('text',{x:'460',y:'432','text-anchor':'middle','dominant-baseline':'central','font-size':'28','font-family':EF});
  ti.textContent='🏆'; svg.appendChild(ti);
  const wt=mk('text',{x:'460',y:'466',class:'center-label'});
  wt.textContent=d.completed?d.winner.toUpperCase():'FINAL'; svg.appendChild(wt);
  if(d.final&&d.final.score){
    const fs=mk('text',{x:'460',y:'481','text-anchor':'middle','font-size':'8.5','font-family':"'Space Mono',monospace"});
    fs.style.fill='var(--gold-soft)'; fs.textContent=d.final.score; svg.appendChild(fs);
  }
  const dt=mk('text',{x:'460',y:'495',class:'center-sub'}); dt.textContent=d.finalDate; svg.appendChild(dt);
  const vn=mk('text',{x:'460',y:'507',class:'center-sub'}); vn.textContent=d.finalVenue.split(',')[0]; svg.appendChild(vn);

  // Connectors (leaf spokes only for 2026 which has 16 R32 boxes at leaf ring)
  drawConnectors(cL, is26);

  if(is26){
    draw2026(cL,lL,r16L,qfL,d);
  } else {
    drawHistorical(cL,lL,r16L,qfL,d);
  }

  wrap.appendChild(svg);
}

function drawConnectors(cL, showLeafSpokes=true){
  function addPath(d2,cls,attr){
    const p=mk('path',{d:d2,class:cls}); if(attr)Object.entries(attr).forEach(([k,v])=>p.setAttribute(k,v));
    cL.appendChild(p); return p;
  }
  function addDot(a,R){const p=polar(R,a);cL.appendChild(mk('circle',{cx:p.x.toFixed(1),cy:p.y.toFixed(1),r:'3.5',class:'joint-dot'}));}

  const Ri=Rleaf-52; // inner ring for leaf spokes
  if(showLeafSpokes){
    leafA.forEach(a=>{
      const lp=polar(Rleaf,a), ip=polar(Ri,a);
      addPath(`M ${lp.x.toFixed(1)} ${lp.y.toFixed(1)} L ${ip.x.toFixed(1)} ${ip.y.toFixed(1)}`,'spoke-line',{'data-la':a.toFixed(2)});
    });
  }
  r16A.forEach((a,i)=>{
    const p1=polar(Ri,leafA[2*i]),p2=polar(Ri,leafA[2*i+1]);
    addPath(`M ${p1.x.toFixed(1)} ${p1.y.toFixed(1)} A ${Ri} ${Ri} 0 0 1 ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`,'tie-line');
    const mp=polar(Ri,a),ip=polar(Rqf,a);
    addPath(`M ${mp.x.toFixed(1)} ${mp.y.toFixed(1)} L ${ip.x.toFixed(1)} ${ip.y.toFixed(1)}`,'spoke-line',{'data-r16a':a.toFixed(2)});
    addDot(a,Ri);
  });
  qfA.forEach((a,i)=>{
    const p1=polar(Rqf,r16A[2*i]),p2=polar(Rqf,r16A[2*i+1]);
    addPath(`M ${p1.x.toFixed(1)} ${p1.y.toFixed(1)} A ${Rqf} ${Rqf} 0 0 1 ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`,'tie-line');
    const mp=polar(Rqf,a),ip=polar(Rsf,a);
    addPath(`M ${mp.x.toFixed(1)} ${mp.y.toFixed(1)} L ${ip.x.toFixed(1)} ${ip.y.toFixed(1)}`,'spoke-line',{'data-qfa':a.toFixed(2)});
    addDot(a,Rqf);
  });
  sfA.forEach((a,i)=>{
    const p1=polar(Rsf,sfA[0]),p2=polar(Rsf,sfA[1]);
    if(i===0) addPath(`M ${p1.x.toFixed(1)} ${p1.y.toFixed(1)} A ${Rsf} ${Rsf} 0 0 1 ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`,'tie-line');
    const mp=polar(Rsf,a),ip=polar(Rfinal,a);
    addPath(`M ${mp.x.toFixed(1)} ${mp.y.toFixed(1)} L ${ip.x.toFixed(1)} ${ip.y.toFixed(1)}`,'spoke-line',{'data-sfa':a.toFixed(2)});
    addDot(a,Rsf);
  });
  const fp1=polar(Rfinal,sfA[0]),fp2=polar(Rfinal,sfA[1]);
  addPath(`M ${fp1.x.toFixed(1)} ${fp1.y.toFixed(1)} A ${Rfinal} ${Rfinal} 0 0 1 ${fp2.x.toFixed(1)} ${fp2.y.toFixed(1)}`,'tie-line');
}

// ── 2026 RENDERING ──
function draw2026(cL,lL,r16L,qfL,d){
  const BW=118,BH=40,PUSH=28;
  // R32 boxes at leaf ring
  d.leaf.forEach((m,i)=>{
    const lf=LEAVES[i],rad=(lf.a-90)*Math.PI/180;
    const bx=lf.x+Math.cos(rad)*PUSH,by=lf.y+Math.sin(rad)*PUSH;
    if(m.winner) hlPath(cL,'data-la',lf.a);
    drawBox(lL,m,bx,by,BW,BH,'leaf-badge','leaf-name','leaf-node');
  });
  // R16 boxes at r16 ring
  const R16W=120,R16H=40;
  (d.r16||[]).forEach((m,i)=>{
    const{bx,by}=boxPt(Rr16,r16A[i],26);
    drawBox(r16L,m,bx,by,R16W,R16H,'r16-badge','r16-name','r16-node');
  });
  // QF boxes — highlight spoke when winner known
  (d.qf||[]).forEach((m,i)=>{
    if(i>=4)return;
    const{bx,by}=boxPt(Rqf,qfA[i],24);
    if(m.winner) hlPath(cL,'data-qfa',qfA[i]);
    drawBox(qfL,m,bx,by,116,38,'qf-badge','qf-name','qf-node');
  });
  // SF boxes — show advancing teams at sf ring
  // SF-1: winner of QF[0]+QF[1] pairs, SF-2: winner of QF[2]+QF[3]
  const sfPairs=[[0,1],[2,3]];
  sfPairs.forEach(([qa,qb],si)=>{
    const mA=d.qf&&d.qf[qa], mB=d.qf&&d.qf[qb];
    const teamA=mA&&mA.winner?mA.winner:(mA?mA.teamA+'/'+mA.teamB:'TBD');
    const flagA=mA&&mA.winner?(mA.winner===mA.teamA?mA.flagA:mA.flagB):'❓';
    const teamB=mB&&mB.winner?mB.winner:(mB?mB.teamA+'/'+mB.teamB:'TBD');
    const flagB=mB&&mB.winner?(mB.winner===mB.teamA?mB.flagA:mB.flagB):'❓';
    const sfMatch={
      id:'sf-'+(si+1),rnd:'Semi-Final',
      teamA,flagA,teamB,flagB,
      score:null,winner:null,scorers:[],
      venue:si===0?'AT&T Stadium, Dallas':'Mercedes-Benz Stadium, Atlanta',
      note:si===0?'Tue 14 Jul · 3PM ET':'Wed 15 Jul · 3PM ET'
    };
    // Highlight SF spoke if both QF matches in this half are done
    const bothDone=mA&&mA.winner&&mB&&mB.winner;
    if(bothDone) hlPath(cL,'data-sfa',sfA[si]);
    const{bx,by}=boxPt(Rsf,sfA[si],22);
    drawSFBox(qfL,sfMatch,bx,by,110,36);
  });
}

// ── HISTORICAL RENDERING ──
function drawHistorical(cL,lL,r16L,qfL,d){
  // Historical WC: same box design as 2026 but 3 rings instead of 4
  // R16 boxes at r16 ring (same position as 2026's R16 ring)
  // QF boxes  at qf ring  (same position as 2026's QF ring)
  // SF boxes  at sf ring  (same position as 2026's SF ring)
  // No circle badges, no leaf-level elements — pure box design throughout

  const R16W=120,R16H=40;
  d.leaf.forEach((m,i)=>{
    const{bx,by}=boxPt(Rr16,r16A[i],26);
    if(m.winner){
      hlPath(cL,'data-r16a',r16A[i]);
      // Also highlight the tie arc at the leaf ring for this R16 slot
      hlPath(cL,'data-la',(leafA[i*2]));
      hlPath(cL,'data-la',(leafA[i*2+1]));
    }
    drawBox(r16L,m,bx,by,R16W,R16H,'r16-badge','r16-name','r16-node');
  });
  // QF boxes at qf ring
  (d.r16||[]).slice(0,4).forEach((m,i)=>{
    const{bx,by}=boxPt(Rqf,qfA[i],24);
    if(m.winner) hlPath(cL,'data-qfa',qfA[i]);
    drawBox(qfL,m,bx,by,116,38,'qf-badge','qf-name','qf-node');
  });
  // SF boxes at sf ring
  (d.qf||[]).slice(0,2).forEach((m,i)=>{
    const{bx,by}=boxPt(Rsf,sfA[i],22);
    drawBox(qfL,m,bx,by,110,36,'qf-badge','qf-name','qf-node');
  });
}

  if(!m)return;
  const done=!!m.winner;
  const sc=done?`<div class="score-central">${m.score}</div>`:`<div class="vs-label">VS</div>`;
  const advLine=done?`<div class="panel-adv">✓ ${m.winner} advance</div>`:'';
  const scorersHTML=done&&m.scorers&&m.scorers.length
    ?`<ul class="scorers-list">${m.scorers.map(s=>`<li>${s}</li>`).join('')}</ul>`
    :`<p class="no-data">${done?'No scorer data.':'Match not yet played.'}</p>`;
  panelEl.innerHTML=`
    <div class="panel-top">
      <div><div class="panel-round">${m.rnd||''}</div>${advLine}</div>
      <button class="close-btn" onclick="closePanel()">✕</button>
    </div>
    <div class="teams-row">
      <div class="team-block"><span class="team-flag-big">${m.flagA}</span><div class="team-name-big${m.winner===m.teamA?' winner-text':''}">${m.teamA}</div></div>
      ${sc}
      <div class="team-block"><span class="team-flag-big">${m.flagB}</span><div class="team-name-big${m.winner===m.teamB?' winner-text':''}">${m.teamB}</div></div>
    </div>
    <span class="status-badge ${done?'ft':'scheduled'}">${done?'Full Time':'Scheduled'}</span>
    <div class="panel-section"><h3>⚽ Goalscorers</h3>${scorersHTML}</div>`;
  overlay.classList.add('open');
}
function closePanel(){overlay.classList.remove('open');}
overlay.addEventListener('click',e=>{if(e.target===overlay)closePanel();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});

// Init
renderTournament(2026);
</script>
</body>
</html>
